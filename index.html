<style>
:root {
  --bg: #141414;
  --fg: #f7f7f7;
  --card: #1d1d1d;
  --brd: #2e2e2e;
  --btn-b: #333;
  --muted: #888;
  --m-dark: #1d1d1d;
  --m-light: #f7f7f7;
}
[data-t="light"] {
  --bg: #eaeaea;
  --fg: #1d1d1d;
  --card: #ffffff;
  --brd: #e0e0e0;
  --btn-b: #cccccc;
  --muted: #666666;
  --m-dark: #f7f7f7;
  --m-light: #1d1d1d;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; }
body {
  background: var(--bg);
  color: var(--fg);
  font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
  font-weight: 400;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding: 24px;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  transition: background-color 0.25s ease, color 0.25s ease;
}
.card {
  background: var(--card);
  border: 1px solid var(--brd);
  border-radius: 16px;
  padding: 48px 40px;
  max-width: 440px;
  width: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  position: relative;
  box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
  transition: background-color 0.25s ease, border-color 0.25s ease;
}
.bar {
  position: absolute;
  top: 14px;
  right: 14px;
  display: flex;
  gap: 6px;
}
.bar button {
  background: none;
  border: 1px solid var(--brd);
  color: var(--fg);
  border-radius: 6px;
  padding: 4px 9px;
  font-size: 12px;
  font-family: inherit;
  font-weight: 500;
  cursor: pointer;
  transition: border-color 0.2s ease, color 0.2s ease;
  line-height: 1.4;
}
.bar button:hover { border-color: var(--btn-b); }
.bar button:focus-visible {
  outline: 2px solid #fc4f00;
  outline-offset: 2px;
}
@keyframes wave {
  0%, 100% { transform: translateY(0) rotate(-1.5deg); }
  50%      { transform: translateY(-9px) rotate(1.5deg); }
}
.mascot {
  width: 130px;
  height: 130px;
  margin-bottom: 20px;
  animation: wave 1.6s ease-in-out infinite;
}
.brand {
  font-size: 18px;
  font-weight: 700;
  color: var(--fg);
  margin-bottom: 28px;
  letter-spacing: 0.18em;
  text-transform: lowercase;
}
.divider {
  width: 28px;
  height: 2px;
  background: #fc4f00;
  border-radius: 1px;
  margin-bottom: 18px;
}
.code {
  font-family: 'Roboto Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.18em;
  color: #fc4f00;
  text-transform: uppercase;
  margin-bottom: 12px;
}
h1 {
  font-size: 24px;
  font-weight: 700;
  color: var(--fg);
  text-align: center;
  margin-bottom: 12px;
  line-height: 1.25;
  letter-spacing: -0.01em;
}
p.lede {
  font-size: 14px;
  color: var(--muted);
  line-height: 1.65;
  text-align: center;
  margin-bottom: 8px;
  max-width: 340px;
}
.p, .e { display: none; }
[data-l="pt"] .p { display: inline; }
[data-l="en"] .e { display: inline; }
@media (max-width: 480px) {
  .card { padding: 40px 24px; }
  h1 { font-size: 21px; }
  .mascot { width: 110px; height: 110px; }
}
@media (prefers-reduced-motion: reduce) {
  .mascot { animation: none; }
  * { transition-duration: 0s !important; }
}
</style>

<script>
(function () {
  var root = document.documentElement;
  var langBtn  = document.querySelector('[data-action="lang"]');
  var themeBtn = document.querySelector('[data-action="theme"]');

  function syncLangBtn() {
    langBtn.textContent = root.dataset.l === 'pt' ? 'EN' : 'PT';
  }
  function syncThemeBtn() {
    themeBtn.textContent = root.dataset.t === 'dark' ? '☀' : '☽';
  }
  langBtn.addEventListener('click', function () {
    root.dataset.l = root.dataset.l === 'pt' ? 'en' : 'pt';
    root.lang = root.dataset.l === 'pt' ? 'pt-BR' : 'en';
    syncLangBtn();
  });
  themeBtn.addEventListener('click', function () {
    root.dataset.t = root.dataset.t === 'dark' ? 'light' : 'dark';
    syncThemeBtn();
  });
  syncLangBtn();
  syncThemeBtn();
})();
</script>
